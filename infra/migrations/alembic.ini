# Alembic config for the Bay Area RE Postgres schema.
#
# Migrations are run with `DATABASE_URL_DIRECT` (the non-pooled Neon
# connection) — pgBouncer transaction-mode pooling breaks `CREATE TYPE`,
# `pg_partman`, and other commands Alembic uses. The `env.py` reads that
# env var; `sqlalchemy.url` here is intentionally left blank.
#
# See `infra/migrations/README.md` for the run procedure.

[alembic]
# Path is relative to the directory `alembic` is invoked from. Always run
# from the repo root: `alembic -c infra/migrations/alembic.ini ...`
script_location = infra/migrations

# Where new revision files are written.
version_locations = infra/migrations/versions

# Template for new file names; YYYY_MM_DD_HHMM-revid_slug.py.
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Read DATABASE_URL_DIRECT from the environment in env.py — leave blank here.
sqlalchemy.url =

# Truncate slugs in filenames so they don't blow past path limits.
truncate_slug_length = 40

# UTC timestamps in version filenames.
timezone = UTC


[post_write_hooks]
# Optional: run ruff on generated revisions so they match the rest of the
# codebase. Disabled by default; enable per-developer.
# hooks = ruff
# ruff.type = console_scripts
# ruff.entrypoint = ruff
# ruff.options = format REVISION_SCRIPT_FILENAME


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
