[project]
name = "bayre-etl"
version = "0.0.0"
description = "ETL: load Phase 0 snapshot JSON files into the market_snapshot table."
requires-python = ">=3.12"
dependencies = [
    "asyncpg>=0.29",
    "python-dotenv>=1.0",
    "bayre-domain",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
sources = ["."]

[tool.hatch.build.targets.wheel.force-include]
"__init__.py" = "etl/__init__.py"
"load_snapshots.py" = "etl/load_snapshots.py"

[tool.hatch.build.targets.sdist]
include = ["__init__.py", "load_snapshots.py"]
