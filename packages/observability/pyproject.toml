[project]
name = "bayre-observability"
version = "0.0.0"
description = "Observability — Phase 0 ships the static status-page generator."
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
sources = ["."]

[tool.hatch.build.targets.wheel.force-include]
"__init__.py" = "observability/__init__.py"
"status_page.py" = "observability/status_page.py"
"py.typed" = "observability/py.typed"

[tool.hatch.build.targets.sdist]
include = [
    "__init__.py",
    "status_page.py",
    "py.typed",
    "pyproject.toml",
]
